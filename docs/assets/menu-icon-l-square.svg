<svg width="26" height="26" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 蒙版：白色区域保留，黑色区域镂空 -->
    <mask id="knockout">
      <rect width="26" height="26" rx="5" fill="white" />

      <!-- 镂空的方括号 [ ] -->
      <g stroke="black" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M 7 5 L 4 5 L 4 21 L 7 21" />
        <path d="M 19 5 L 22 5 L 22 21 L 19 21" />
      </g>

      <!-- 镂空的字母 L - 使用强力的几何线条 -->
      <path d="M 9 7 L 9 19 L 16 19" stroke="black" stroke-width="2.8" stroke-linecap="butt" stroke-linejoin="miter" fill="none" />
    </mask>
  </defs>

  <!-- 基础图层：1:1 完美正方形胶囊 (Template Image) -->
  <rect width="26" height="26" rx="5" fill="black" mask="url(#knockout)" />
</svg>
