<svg width="26" height="18" viewBox="0 0 26 18" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 蒙版：白色区域保留，黑色区域镂空 -->
    <mask id="knockout">
      <rect width="26" height="18" rx="4" fill="white" />
      
      <!-- 镂空的方括号 -->
      <g stroke="black" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M 6 4 L 4 4 L 4 14 L 6 14" />
        <path d="M 20 4 L 22 4 L 22 14 L 20 14" />
      </g>
      
      <!-- 镂空的汉字 -->
      <text x="13" y="13.5" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="black">紫</text>
    </mask>
  </defs>
  
  <!-- 基础图层：纯黑实心圆角矩形 (Template Image 机制会根据系统主题自动将其渲染为黑或白) -->
  <rect width="26" height="18" rx="4" fill="black" mask="url(#knockout)" />
</svg>
