<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 极深的黑曜石紫 -->
    <linearGradient id="monolithBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#231A31" />
      <stop offset="100%" stop-color="#0F0A16" />
    </linearGradient>
  </defs>

  <!-- 基础底座 -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#monolithBg)" />
  
  <!-- 极简微弱的高光边缘 -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />

  <!-- 极其纤细锋利的 [ ] -->
  <g stroke="#F8F8F8" stroke-width="12" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <path d="M 360 280 L 260 280 L 260 744 L 360 744" />
    <path d="M 664 280 L 764 280 L 764 744 L 664 744" />
  </g>

  <!-- 纤细的汉字 -->
  <text x="512" y="690" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Songti SC', serif" font-size="400" font-weight="200" text-anchor="middle" fill="#F8F8F8">紫</text>
</svg>
