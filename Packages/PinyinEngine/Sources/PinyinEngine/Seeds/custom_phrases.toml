# 紫霞输入法自定义短语配置文件
#
# 示例条目继承自紫光拼音输入法默认配置，保留以延续老用户的使用习惯。
#
# 文件格式：TOML（https://toml.io）
#
# 短语定义：
#   单值          name = '内容'
#   多个候选      name = ['候选 1', '候选 2', ...]
#   多行内容      name = '''
#                 多行
#                 文本
#                 '''
#
# 短语名称约定：
# - 须以英文字母开头，大小写敏感。
# - 名称中加入 `0` 可避免与日常拼音输入冲突（如 `xl0`、`sz0kh`）。这并非语法要求，
#   仅是约定俗成的反碰撞做法。候选区激活时 `1`-`9` 作为选字数字键，
#   故标记字符几乎只能选 `0`。紫光传统采用 `_` 作为分隔符，
#   但本输入法已将 `_` 用于中文破折号的快捷输入，故不再适用。
# - 建议长度 ≥ 4 个字符，进一步降低误触发概率。

